version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vedix-postgres
    environment:
      POSTGRES_USER: vedix_user
      POSTGRES_PASSWORD: vedix_password
      POSTGRES_DB: vedix
    ports:
      - "5433:5432"
    volumes:
      - vedix-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vedix_user -d vedix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vedix-redis
    ports:
      - "6379:6379"
    volumes:
      - vedix-redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  minio:
    image: minio/minio:latest
    container_name: vedix-minio
    environment:
      MINIO_ROOT_USER: patelrahul01131
      MINIO_ROOT_PASSWORD: '123456789R@#ul'
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - vedix-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: vedix-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set vedix-minio http://minio:9000 patelrahul01131 '123456789R@#ul';
      /usr/bin/mc mb vedix-minio/vedix-media --ignore-existing;
      /usr/bin/mc anonymous set public vedix-minio/vedix-media;
      exit 0;
      "

volumes:
  vedix-pg-data:
  vedix-redis-data:
  vedix-minio-data:
